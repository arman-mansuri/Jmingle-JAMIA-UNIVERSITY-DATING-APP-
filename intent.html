<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .option-circle:hover .icon-bounce {
            animation: bounce 0.6s infinite alternate;
        }
        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }
        .modal-overlay {
            backdrop-filter: blur(8px);
            transition: opacity 0.3s ease;
        }
        .hidden { display: none !important; }

        /* 16:9 aspect-ratio container, centered and scaled to fit any screen */
        html, body {
            width: 100%;
            height: 100%;
            background: #000;
        }
        .aspect-frame {
            aspect-ratio: 16 / 9;
            width: min(100vw, 177.78vh);
            height: min(100vh, 56.25vw);
            margin: auto;
            position: relative;
            overflow: hidden;

<body class="bg-black min-h-screen h-screen w-full flex items-center justify-center overflow-hidden">
<div class="aspect-frame bg-background text-on-background flex flex-col overflow-hidden relative">
<!-- TopNavBar -->
<header class="bg-surface dark:bg-background border-b border-surface-container-highest dark:border-on-surface-variant top-0 z-50 shrink-0 h-24">
<div class="flex justify-between items-center w-full px-margin-mobile max-w-[1200px] mx-auto h-24 relative">
<button class="w-10 h-10 flex items-center justify-start text-primary btn-touch"
        onclick="history.back()">
    <span class="material-symbols-outlined">arrow_back</span>
</button>

<img src="logo.png" alt="JMingle" class="h-12 absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2">
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile py-md max-w-[1200px] mx-auto w-full relative overflow-hidden max-w-5xl">
<!-- Question Header -->
<div class="text-center mb-xl shrink-0">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-xs">What are you looking for?</h1>
<p class="font-body-md text-body-md text-secondary">Be honest with your intentions to find the best match.</p>
</div>
<!-- Options Grid - Horizontal for Desktop -->
<div class="flex flex-row items-center justify-center gap-xl w-full max-w-5xl relative">
<!-- Option 1: Casual Dating -->
<button class="option-circle group relative flex flex-col items-center justify-center w-[360px] aspect-square rounded-full border-2 border-transparent hover:border-primary transition-all duration-300 shadow-sm hover:shadow-2xl p-lg overflow-hidden active:scale-95 shrink-0" onclick="showErrorModal()" style="background-color: rgb(251, 65, 58); color: white;">
<div class="mb-sm text-white group-hover:scale-110 transition-transform duration-300">
<span class="material-symbols-outlined !text-6xl icon-bounce" data-icon="local_fire_department">local_fire_department</span>
</div>
<span class="font-headline-md text-headline-md text-white">Casual Dating</span>

</button>
<!-- Option 2: Intended to Marry -->
<button id="marryBtn"
class="option-circle group relative flex flex-col items-center justify-center w-[360px] aspect-square rounded-full border-2 border-transparent transition-all duration-300 shadow-sm hover:shadow-2xl p-lg overflow-hidden active:scale-95 shrink-0"
style="background-color: rgb(53, 103, 52); color: white;"
onclick="window.location.href='app-files/index.html'">

    <div class="mb-sm group-hover:scale-110 transition-transform duration-300">
        <span class="material-symbols-outlined !text-6xl icon-bounce"
        style="font-variation-settings:'FILL' 1;">
            favorite
        </span>
    </div>

    <span class="font-headline-md text-headline-md">
        Intended to Marry
    </span>

</button>

<!-- Success indicator -->
<div class="absolute top-10 right-1/4 translate-x-1/2">

</div>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="shrink-0 w-full z-40 flex justify-center items-center px-6 py-4 pb-safe">
<div class="bg-surface-container-lowest dark:bg-inverse-surface shadow-lg rounded-t-xl flex justify-center w-full max-w-content py-2 px-6">

</div>
</nav>
<!-- Error Modal -->
<div class="fixed inset-0 z-[100] items-center justify-center p-gutter hidden" id="errorModal">
<div class="modal-overlay absolute inset-0 bg-on-surface/40" onclick="closeModal()"></div>
<div class="relative bg-surface-container-lowest rounded-3xl p-lg max-w-[400px] w-full shadow-2xl transform transition-all duration-300 scale-95 opacity-0" id="modalContent">
<div class="flex flex-col items-center text-center">
<div class="w-20 h-20 bg-error-container text-on-error-container rounded-full flex items-center justify-center mb-md">
<span class="material-symbols-outlined !text-4xl" data-icon="warning">warning</span>
</div>
<h2 class="font-headline-md text-headline-md text-on-surface mb-sm">Not a match?</h2>
<p class="font-body-md text-body-md text-secondary mb-lg">
                    Sorry, this is not for you. Jmingle is built for meaningful, long-term connections. Go for <span class="font-bold text-on-surface">Tinder</span> or <span class="font-bold text-on-surface">Bumble</span> instead.
                </p>
<button class="w-full bg-primary text-on-primary font-label-md py-4 rounded-full hover:opacity-90 active:scale-95 transition-all" onclick="closeModal()">
                    I understand
                </button>
</div>
</div>
</div>
<script>
        function showErrorModal() {
            const modal = document.getElementById('errorModal');
            const content = document.getElementById('modalContent');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            // Trigger animation
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('errorModal');
            const content = document.getElementById('modalContent');
            
            content.classList.add('scale-95', 'opacity-0');
            content.classList.remove('scale-100', 'opacity-100');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 300);
        }

        // Add visual interest with floating decorative elements
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.querySelector('.aspect-frame');
            for(let i = 0; i < 5; i++) {
                const dot = document.createElement('div');
                dot.className = 'absolute rounded-full opacity-5 pointer-events-none bg-primary blur-xl';
                const size = Math.random() * 300 + 100;
                dot.style.width = `${size}px`;
                dot.style.height = `${size}px`;
                dot.style.left = `${Math.random() * 100}%`;
                dot.style.top = `${Math.random() * 100}%`;
                dot.style.zIndex = "0";
                container.appendChild(dot);
            }
        });
    </script>

</div>
